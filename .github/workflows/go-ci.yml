name: Build and Test Go App

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: bytebattle
          POSTGRES_PASSWORD: bytebattle
          POSTGRES_DB: bytebattle
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install tools
        run: |
          go install github.com/pressly/goose/v3/cmd/goose@latest
          go install github.com/jstemmer/go-junit-report@latest

      - name: Run migrations
        run: goose -dir schema postgres "postgres://bytebattle:bytebattle@localhost:5432/bytebattle?sslmode=disable" up

      - name: Build the application
        run: go build -v ./...

      - name: Run tests and generate output
        env:
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: bytebattle
          PG_PASSWORD: bytebattle
          PG_DBNAME: bytebattle
        run: |
          go test -v -json ./... 2>&1 | tee test_output.json || true

      - name: Generate XML report
        if: always()
        run: |
          cat test_output.json | go-junit-report > report.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-test-report
          path: report.xml

      - name: Check test status
        run: |
          if grep -q '"action":"fail"' test_output.json; then
            echo "Tests failed!"
            exit 1
          fi